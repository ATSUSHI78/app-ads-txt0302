<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SizeSync Japan Support</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #161b22;
            padding: 2.5rem;
            border-radius: 16px;
            border: 1px solid #30363d;
            box-shadow: 0 12px 32px rgba(0,0,0,0.4);
            text-align: center;
            max-width: 480px;
            width: 90%;
        }
        h1 {
            color: #f0f6fc;
            font-size: 1.75rem;
            margin-bottom: 1.5rem;
            font-weight: 700;
        }
        p {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 1.2rem;
            color: #8b949e;
        }
        .links {
            margin-top: 2rem;
        }
        .btn {
            display: block;
            background-color: #238636;
            color: white;
            padding: 14px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 1rem;
            transition: background-color 0.2s;
        }
        .btn:hover {
            background-color: #2ea043;
        }
        .secondary-link {
            display: inline-block;
            color: #58a6ff;
            text-decoration: none;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }
        .secondary-link:hover {
            text-decoration: underline;
        }
        .footer {
            margin-top: 2.5rem;
            font-size: 0.8rem;
            color: #484f58;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>SizeSync Japan</h1>
        <p>Thank you for using our app. For support, inquiries, or to view our Privacy Policy, please visit our official site.</p>
        
        <div class="links">
            <a href="https://sites.google.com/view/sizesync-jp/home" class="btn">Visit Official Support Site</a>
            <a href="https://sites.google.com/view/sizesync-jp/home" class="secondary-link">Privacy Policy & App Details</a>
        </div>
        
        <div class="footer">
            &copy; 2026 SizeSync Japan. All rights reserved.
        </div>
    </div>
</body>
</html>
